services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - microservice_net

  auth-api:
    build: ./auth-api
    container_name: auth-api
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=${REDIS_HOST}
    restart: unless-stopped
    networks:
      - microservice_net

  users-api:
    build: ./users-api
    container_name: users-api
    ports:
      - "8081:8083"
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
    restart: unless-stopped
    networks:
      - microservice_net

  todos-api:
    build: ./todos-api
    container_name: todos-api
    ports:
      - "3000:8082"
    environment:
      - REDIS_HOST=${REDIS_HOST}
    restart: unless-stopped
    networks:
      - microservice_net

  log-message-processor:
    build: ./log-message-processor
    container_name: log-processor
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_CHANNEL=${REDIS_CHANNEL}
    restart: unless-stopped
    networks:
      - microservice_net

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8085:80"
    depends_on:
      - auth-api
      - users-api
      - todos-api
    restart: unless-stopped
    networks:
      - microservice_net

networks:
  microservice_net: