name: CI/CD Pipeline

on:
  push:
    branches: [ dev, main, feature/github-actions-ci ]
  pull_request:
    branches: [ dev, main ]

env:
  IMAGE_NAMESPACE: ${{ vars.DOCKERHUB_USERNAME }}
  REGISTRY: docker.io


jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      changed-services: ${{ steps.detect.outputs.json }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes in microservices
        id: detect
        uses: dorny/paths-filter@v3
        with:
          list-files: json
          filters: |
            frontend: 'frontend/**'
            todos-api: 'todos-api/**'
            users-api: 'users-api/**'
            auth-api: 'auth-api/**'
            log-message-processor: 'log-message-processor/**'

  build-test-scan:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, todos-api, users-api, auth-api, log-message-processor]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/devops-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        if: |
          (matrix.service == 'frontend' && fromJSON(needs.prepare.outputs.changed-services).frontend) ||
          (matrix.service == 'todos-api' && fromJSON(needs.prepare.outputs.changed-services).todos-api) ||
          (matrix.service == 'users-api' && fromJSON(needs.prepare.outputs.changed-services).users-api) ||
          (matrix.service == 'auth-api' && fromJSON(needs.prepare.outputs.changed-services).auth-api) ||
          (matrix.service == 'log-message-processor' && fromJSON(needs.prepare.outputs.changed-services).log-message-processor)
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Unit Tests
        run: |
          echo "Running tests for ${{ matrix.service }}"
          case "${{ matrix.service }}" in
            "frontend")
              cd frontend && npm ci && npm test
              ;;
            "todos-api")
              cd todos-api && npm ci && npm test
              ;;
            "users-api")
              cd users-api && ./mvnw test -DskipTests=false || true
              ;;
            "auth-api")
              cd auth-api && go test ./...
              ;;
            "log-message-processor")
              cd log-message-processor && pip install -r requirements.txt && pytest
              ;;
          esac

      - name: Security Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/devops-${{ matrix.service }}:latest
          format: 'table'

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-test-scan
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Staging (compose)
        run: docker compose -f docker-compose.yml up -d

  integration-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
      - name: Run Integration Tests
        run: |
          echo "Waiting services..."
          sleep 15
          curl -f http://localhost:8080/login || exit 1
          curl -f http://localhost:3000/todos || exit 1

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-test-scan]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        run: |
          echo "Deploying to Production"
          docker compose -f docker-compose.yml up -d