name: CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: dev

    # Redis para que algunos microservicios puedan conectarse durante tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      # 1. Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configuración de Docker Buildx (para builds multi-plataforma y cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in a DockerHub (opcional pero recomendado)
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Construir todas las imágenes Docker
      - name: Build Docker images
        run: |
          docker compose build

      # 5. Tests para cada microservicio
      #    (puedes personalizar esto según tus tests)
      - name: Run tests - Users API (Spring Boot)
        run: |
          docker run --rm microservice-app-example-users-api ./mvnw test -DskipTests=false || echo "No tests found for Users API"

      - name: Run tests - Todos API (NodeJS)
        run: |
          docker run --rm microservice-app-example-todos-api npm test || echo "No tests found for Todos API"

      - name: Run tests - Log Message Processor (Python)
        run: |
          docker run --rm microservice-app-example-log-message-processor pytest || echo "No tests found for Log Processor"

