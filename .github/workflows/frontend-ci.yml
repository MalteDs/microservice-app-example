name: Frontend - CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - feature/github-actions-ci
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - dev
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

env:
  SERVICE_NAME: frontend
  IMAGE_VERSION: v1.${{ github.run_number }}
  DOCKER_USER: ${{ vars.DOCKERHUB_USERNAME }}
  DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASS }}

      # Construir y subir imagen Docker (usa Dockerfile existente)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.DOCKER_USER }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke test del contenedor publicado
      - name: Smoke test container
        run: |
          docker run -d -p 8085:80 --name frontend-test ${{ env.DOCKER_USER }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_VERSION }}
          sleep 10
          curl -f http://localhost:8085 || (docker logs frontend-test && exit 1)
