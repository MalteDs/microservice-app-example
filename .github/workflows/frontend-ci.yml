name: Frontend - CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - feature/github-actions-ci
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - dev
    paths:
      - 'frontend/**'
      - '.github/workflows/**'

env:
  SERVICE_NAME: frontend
  IMAGE_VERSION: v1.${{ github.run_number }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # Construir y subir imagen Docker (usa Dockerfile existente)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke test usando docker-compose para levantar dependencias
      - name: Smoke test with docker-compose

        run: |
          # Reemplaza la imagen de frontend en docker-compose por la recién construida
          sed -i "s|build: ./frontend|image: ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_VERSION }}|" docker-compose.yml
          docker compose -f docker-compose.yml up -d frontend auth-api users-api todos-api redis
          sleep 20
          curl -f http://localhost:8085 || (docker compose logs frontend && exit 1)
