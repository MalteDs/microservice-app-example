name: Frontend - CI Pipeline

on:
  push:
    branches:
      - dev
      - feature/github-actions-ci
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - dev
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      # 1. Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js (para Vue)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      # 3. Instalar dependencias
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      # 4. Correr tests (si tienes)
      - name: Run tests
        working-directory: ./frontend
        run: npm test || echo "No tests found"

      # 5. Construir artefactos frontend
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # 6. Configurar Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 8. Construir y subir imagen Docker
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/frontend:latest
            ${{ vars.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}

      # 9. Subir artefactos del build (por ejemplo, dist/)
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./frontend/dist
