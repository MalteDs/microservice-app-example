name: Integration CI

on:
  push:
    branches:
      - dev
      - main
      - feature/github-actions-ci
  pull_request:
    branches:
      - dev
      - main

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest images (opcional)
        run: docker compose -f docker-compose.yml pull || true

      - name: Replace images in docker-compose.yml with latest built images
        run: |
          sed -i "s|build: ./frontend|image: ${{ vars.DOCKERHUB_USERNAME }}/frontend:latest|" docker-compose.yml
          sed -i "s|build: ./auth-api|image: ${{ vars.DOCKERHUB_USERNAME }}/auth-api:latest|" docker-compose.yml
          sed -i "s|build: ./users-api|image: ${{ vars.DOCKERHUB_USERNAME }}/users-api:latest|" docker-compose.yml
          sed -i "s|build: ./todos-api|image: ${{ vars.DOCKERHUB_USERNAME }}/todos-api:latest|" docker-compose.yml
          sed -i "s|build: ./log-message-processor|image: ${{ vars.DOCKERHUB_USERNAME }}/log-message-processor:latest|" docker-compose.yml

      - name: Start stack with docker-compose
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          REDIS_HOST: redis
          REDIS_PORT: 6379
          REDIS_CHANNEL: ${{ secrets.REDIS_CHANNEL || 'log_channel' }}
          SPRING_PROFILES_ACTIVE: ${{ vars.SPRING_PROFILES_ACTIVE || 'local' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'default-secret-for-testing' }}
        run: |
          # Crear archivo .env para docker-compose
          echo "REDIS_HOST=redis" > .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_CHANNEL=${REDIS_CHANNEL:-log_channel}" >> .env
          echo "SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-local}" >> .env
          echo "JWT_SECRET=${JWT_SECRET:-default-secret-for-testing}" >> .env
          docker compose -f docker-compose.yml up -d

      - name: Wait for services to be ready
        run: |
          sleep 30
          echo "Waiting for auth-api to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "Auth API is ready"
              break
            fi
            echo "Waiting for auth-api... attempt $i"
            sleep 3
          done
          echo "Waiting for todos-api to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8082/ > /dev/null 2>&1; then
              echo "Todos API is ready"
              break
            fi
            echo "Waiting for todos-api... attempt $i"
            sleep 3
          done
          echo "Waiting for frontend to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8085/ > /dev/null 2>&1; then
              echo "Frontend is ready"
              break
            fi
            echo "Waiting for frontend... attempt $i"
            sleep 3
          done

      - name: Run E2E Integration Tests
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8080/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin"}' | jq -r .accessToken)

          echo "Access token: $TOKEN"

          curl -f -H "Authorization: Bearer $TOKEN" http://localhost:8082/todos

          curl -f http://localhost:8085 || exit 1

      - name: Show logs if fail
        if: failure()
        run: docker compose logs