name: Users API - CI Pipeline

on:
  push:
    branches:
      - dev
      - feature/github-actions-ci
    paths:
      - 'users-api/**'
      - '.github/workflows/users-api-ci.yml'
  pull_request:
    branches:
      - dev
    paths:
      - 'users-api/**'
      - '.github/workflows/users-api-ci.yml'

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    environment: dev  # para que coja tus secrets/variables de environment dev

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (o la versión que uses en users-api)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      # 3. Set up Docker Buildx (para imágenes)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log in to DockerHub (usa tus secrets)
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build Users API with Maven (antes de crear la imagen Docker)
      - name: Build Users API (Maven)
        working-directory: ./users-api
        run: mvn -B -DskipTests clean package

      # 6. Run tests (unit/integration)
      - name: Run Tests (Maven)
        working-directory: ./users-api
        run: mvn -B test

      # 7. Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./users-api
          file: ./users-api/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/users-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/users-api:${{ github.sha }}

      # 8. Upload surefire reports for visibility
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: users-api-surefire-reports
          path: users-api/target/surefire-reports
