name: Users API - CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - feature/github-actions-ci
    paths:
      - 'users-api/**'
      - '.github/workflows/users-api-ci.yml'
  pull_request:
    branches:
      - dev
    paths:
      - 'users-api/**'
      - '.github/workflows/users-api-ci.yml'

env:
  SERVICE_NAME: users-api
  IMAGE_VERSION: v1.${{ github.run_number }}
  DOCKER_USER: ${{ vars.DOCKERHUB_USERNAME }}
  DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}


jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASS }}

      # Build + test con Maven
      - name: Build Users API
        working-directory: ./users-api
        run: mvn -B clean package -DskipTests

      - name: Run Unit Tests
        working-directory: ./users-api
        run: mvn -B test


      # 3. Build & Push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./users-api
          file: ./users-api/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.DOCKER_USER }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # 4. Smoke test container published
      - name: Smoke test container
        run: |
          docker run -d -p 8081:8081 --name users-api-test ${{ env.DOCKER_USER }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_VERSION }}
          sleep 15
          curl -f http://localhost:8081/actuator/health || (docker logs users-api-test && exit 1)