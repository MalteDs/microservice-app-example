name: Todos API - CI Pipeline

on:
  push:
    branches:
      - dev
      - feature/github-actions-ci
    paths:
      - 'todos-api/**'
      - '.github/workflows/todos-api-ci.yml'
  pull_request:
    branches:
      - dev
    paths:
      - 'todos-api/**'
      - '.github/workflows/todos-api-ci.yml'

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./todos-api/package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: ./todos-api
        run: npm ci

      # 4. Run tests
      - name: Run Tests
        working-directory: ./todos-api
        run: npm test

      # 5. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7. Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./todos-api
          file: ./todos-api/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/todos-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/todos-api:${{ github.sha }}

      # 8. Upload test results as artifact
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: todos-api-test-results
          path: ./todos-api/test-results
