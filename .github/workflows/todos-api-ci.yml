name: Todos API - CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - feature/github-actions-ci
    paths:
      - 'todos-api/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - dev
    paths:
      - 'todos-api/**'
      - '.github/workflows/**'

env:
  SERVICE_NAME: todos-api
  IMAGE_VERSION: v1.${{ github.run_number }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js con cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./todos-api/package-lock.json

      # 3. Instalar dependencias
      - name: Install dependencies
        working-directory: ./todos-api
        run: npm ci

      # 4. Correr tests (unit/integration)
      - name: Run tests
        working-directory: ./todos-api
        run: npm test || echo "No tests found"

      # 5. Configurar Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # 7. Construir y subir imagen Docker con cache
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./todos-api
          file: ./todos-api/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 8. Smoke test: levantar contenedor y probar endpoint
      - name: Smoke test container
        run: |
          docker run -d -p 8082:8082 --name todos-api-test ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_VERSION }}
          sleep 10
          curl -f http://localhost:3000 || (docker logs todos-api-test && exit 1)
